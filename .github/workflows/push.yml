name: CI
on:
  push:
  branches: master
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      -name: "checkout code"
       uses: actions/checkout@v7
      -name: "Docker setup"
       uses: docker/login-action@v3
       with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
       
       
  
